# ============================================================
# Nginx - Reverse Proxy para OmniVident
# ============================================================
# Este archivo va en: /etc/nginx/sites-available/omnivident
# Certbot agrega automaticamente la config SSL despues.
# ============================================================

server {
    listen 80;
    server_name omnivident.megamayorista.net;

    # Tamano maximo de subida (para imagenes de agentes, etc.)
    client_max_body_size 10M;

    # Redirigir todo al contenedor de Docker (puerto 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts largos (los agentes pueden tardar minutos)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
